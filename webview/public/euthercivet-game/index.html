<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EutherCivet</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101d16;
    }

    #euthercivet-bevy-canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      touch-action: none;
    }

    #euthercivet-load-error {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      color: #ffe8b3;
      background: #101d16;
      font: 700 15px system-ui, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="euthercivet-bevy-canvas"></canvas>
  <div id="euthercivet-load-error"></div>
  <script type="module">
    import init from "./pkg/euthercivet.js";

    init().catch((error) => {
      console.error(error);
      const target = document.querySelector("#euthercivet-load-error");
      target.textContent = error?.message ?? String(error);
      target.style.display = "grid";
    });
  </script>
</body>
</html>
