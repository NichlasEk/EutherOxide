<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>EutherAlert</title>
    <link rel="stylesheet" href="./style.css?v=20260611-openra-required" />
  </head>
  <body>
    <main class="alert-shell openra-required">
      <canvas id="battlefield" width="1280" height="720"></canvas>
      <video id="openra-stream" class="openra-stream" muted playsinline autoplay></video>
      <div id="openra-touch-plane" class="openra-touch-plane" aria-label="OpenRA touch mouse surface"></div>
      <div id="openra-cursor" class="openra-cursor" aria-hidden="true"></div>
      <section class="hud mouse-toolbar" aria-label="OpenRA mouse controls">
        <button id="mouse-left" class="is-active" type="button"><span>L</span><b>Select</b></button>
        <button id="mouse-right" type="button"><span>R</span><b>Order</b></button>
        <button id="mouse-drag" type="button"><span>□</span><b>Drag</b></button>
        <button id="mouse-escape" type="button"><span>Esc</span><b>Menu</b></button>
      </section>
      <section class="hud top-hud">
        <div>
          <span id="role-label">Spectator</span>
          <strong>EutherAlert</strong>
        </div>
        <div class="resource-strip">
          <span>Credits <b id="credits">0</b></span>
          <span>Power <b id="power">0</b></span>
          <span>Units <b id="units">0</b></span>
        </div>
      </section>
      <section class="hud command-rail">
        <button id="select-base" class="touch-command" type="button">
          <span>⌂</span>
          <b>Base</b>
        </button>
        <button id="attack-move" class="touch-command" type="button">
          <span>✦</span>
          <b>Attack</b>
        </button>
        <button id="hold-position" class="touch-command" type="button">
          <span>■</span>
          <b>Hold</b>
        </button>
        <button id="center-action" class="touch-command" type="button">
          <span>◎</span>
          <b>Focus</b>
        </button>
      </section>
      <section class="hud side-panel">
        <div class="panel-head">
          <span id="selection-label">No selection</span>
          <strong id="order-label">Ready</strong>
        </div>
        <canvas id="minimap" width="180" height="120" aria-label="minimap"></canvas>
      </section>
      <section class="hud build-dock">
        <div class="dock-head">
          <span>Production</span>
          <strong id="dock-status">Ready</strong>
        </div>
        <div class="build-grid">
          <button data-build="refinery" type="button"><span>▣</span><b>Refinery</b></button>
          <button data-build="barracks" type="button"><span>▥</span><b>Barracks</b></button>
          <button data-build="factory" type="button"><span>▤</span><b>Factory</b></button>
          <button data-build="power" type="button"><span>⚡</span><b>Power</b></button>
          <button data-train="rifle" type="button"><span>•</span><b>Rifle</b></button>
          <button data-train="tank" type="button"><span>▲</span><b>Tank</b></button>
        </div>
      </section>
      <section class="gesture-strip" aria-hidden="true">
        <span>Tap select / order</span>
        <span>Hold + drag box select</span>
        <span>Two fingers zoom</span>
      </section>
      <section class="orientation-card" aria-hidden="true">
        <strong>Turn phone to landscape</strong>
        <span>OpenRA is playable in fullscreen landscape mode.</span>
      </section>
      <div id="toast" class="toast">Initializing</div>
    </main>
    <script src="./game.js?v=20260611-openra-required" type="module"></script>
  </body>
</html>
